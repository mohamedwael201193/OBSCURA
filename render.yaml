###############################################################################
# Obscura — Render Deployment Config  (FREE TIER)
#
# 2 services — both FREE web services (no paid workers):
#   obscura-api    — ERC-4337 relay + Web Push notifications
#   obscura-worker — on-chain event indexer + credit keeper (with /health endpoint)
#
# Free tier note: services sleep after 15 min of no traffic.
# The worker wakes on its own health-check ping. Use UptimeRobot (free) to
# ping /health every 5 min to keep both services awake.
#
# Deploy: Connect repo on render.com → New → Blueprint → select this repo.
###############################################################################

services:
  # ── obscura-api ─────────────────────────────────────────────────────────────
  - type: web
    name: obscura-api
    runtime: node
    plan: free
    rootDir: backend/obscura-api
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: ALLOWED_ORIGINS
        value: "https://obscura-os-nine.vercel.app"
