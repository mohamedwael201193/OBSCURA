###############################################################################
# Obscura — Render Deployment Config  (FREE TIER)
#
# SECURITY: All secret values use `sync: false` — they are set manually
# in the Render dashboard and NEVER committed to source control.
#
# Non-secret config (contract addresses, ports, flags) is safe to store here.
###############################################################################

services:
  # ── obscura-api ─────────────────────────────────────────────────────────────
  - type: web
    name: obscura-api
    runtime: node
    plan: free
    rootDir: backend/obscura-api
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # ── Non-secret config (safe to commit) ──────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: ALLOWED_ORIGINS
        value: "https://obscura-os-nine.vercel.app"
      - key: FRONTEND_URL
        value: "https://obscura-os-nine.vercel.app"
      - key: PAYMASTER_ADDRESS
        value: "0x9B1F61A65467F11339A8d0834349Be32EB2CF878"
      - key: SUPABASE_URL
        value: "https://quoovjkjwgtdqwdofubh.supabase.co"
      - key: VAPID_CONTACT_EMAIL
        value: "noreply@obscura.finance"
      - key: VAPID_PUBLIC_KEY
        value: "BIgVcwUhCL93WVMnDdRT9KqySwDS4Sm9C-fSLg4dWJRdddSuLbyDv_M9R5FmDi2F8NwDuKuMtvNiZAwZQ0RH86o"
      # ── Secrets — set in Render dashboard, never in YAML ────────────────────
      - key: BUNDLER_URL
        sync: false
      - key: BUNDLER_URL_FALLBACK
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false

  # ── obscura-worker ───────────────────────────────────────────────────────────
  - type: web
    name: obscura-worker
    runtime: node
    plan: free
    rootDir: backend/obscura-worker
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
