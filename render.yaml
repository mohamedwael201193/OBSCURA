        value: "https://obscura-os-nine.vercel.app"
      - key: VAPID_CONTACT_EMAIL
        value: "noreply@obscura.finance"
      - key: VAPID_PUBLIC_KEY
        value: "BIgVcwUhCL93WVMnDdRT9KqySwDS4Sm9C-fSLg4dWJRdddSuLbyDv_M9R5FmDi2F8NwDuKuMtvNiZAwZQ0RH86o"
      - key: CHAINLINK_ETHUSD_ADAPTER
